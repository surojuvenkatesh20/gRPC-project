syntax = "proto3";

import "validate/validate.proto";
import "students.proto";
package main;

option go_package="/proto/gen;grpcapipb";

service ExecsService {
    rpc GetExecs (GetExecsRequest) returns (Execs);
    rpc AddExecs (Execs) returns (Execs);
    rpc UpdateExecs (Execs) returns (Execs);
    rpc DeleteExecs (ExecIds) returns (DeleteExecsConfirmation);

    rpc ExecLogin (ExecLoginRequest) returns (ExecLoginResponse);
    rpc ExecLogout (EmptyRequest) returns (ExecLogoutResponse);
    rpc ExecUpdatePassword (ExecUpdatePasswordRequest) returns (ExecUpdatePasswordResponse);
    rpc ExecForgotPassword (ExecForgotPasswordRequest) returns (ExecForgotPasswordResponse);
    rpc ExecResetPassword (ExecResetPasswordRequest) returns (Confirmation);
    rpc ExecDeactivate (ExecIds) returns (Confirmation);
}


message ExecLoginRequest {
    string username = 1 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$", ignore_empty: false}];
    string password = 2 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$", ignore_empty: false}];
}

message ExecLoginResponse {
    bool status = 1;
    string token = 2;
}

message ExecForgotPasswordRequest {
    string email = 1 [(validate.rules).string = {email: true}];
}

message ExecForgotPasswordResponse {
    bool confirmation = 1;
    string message = 2;
}

message ExecResetPasswordRequest {
    string token = 1;
    string new_password = 2 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$"}];
    string confirm_password = 3 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$"}];
}

message Confirmation {
    bool confirmation = 1;
}

message ExecUpdatePasswordRequest{ 
    string id = 1 [(validate.rules).string = {min_len: 24, max_len: 24, pattern: "^[a-fA-F0-9]*$"}];
    string current_password = 2 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$"}];
    string new_password = 3 [(validate.rules).string = {min_len: 6, pattern: "^[a-zA-Z0-9.@#$*_+-]*$"}];
}

message ExecUpdatePasswordResponse{
    bool password_updated_status = 1;
    string token = 2;
}


message EmptyRequest {
}

message ExecLogoutResponse {
    bool logged_out = 1;
}

message ExecId {
    string id = 1 [(validate.rules).string = {min_len: 24, max_len: 24, pattern: "^[a-fA-F0-9]*$"}];
}

message ExecIds {
    repeated ExecId ids = 1 [(validate.rules).repeated = {min_items: 1}];
}

message DeleteExecsConfirmation {
    string status = 1;
    repeated string deletedIds = 2;
}

message GetExecsRequest {
    Exec exec = 1;
    repeated SortField sortBy = 2;
    uint32 page_number = 3;
    uint32 page_size = 4;
}

message Exec {
    string id = 1;
    string first_name = 2 [(validate.rules).string = {pattern: "^[a-zA-Z0-9 ]*$"}];
    string last_name = 3 [(validate.rules).string = {pattern: "^[a-zA-Z0-9 ]*$"}];
    string email = 4 [(validate.rules).string = {email: true}];
    string username = 5 [(validate.rules).string = {pattern: "^[a-zA-Z0-9+-@.#$]*$"}];
    string password = 6 [(validate.rules).string = {pattern: "^[a-zA-Z0-9+-@.#$]*$"}];
    string password_changed_at = 7;
    string user_created_at = 8;
    string password_reset_token = 9;
    string password_token_expires = 10;
    string role = 11;
    bool inactive_status = 12;

}

message Execs {
    repeated Exec execs = 1;
}